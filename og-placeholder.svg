<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="logoG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- ロゴアイコン -->
  <rect x="80" y="180" width="120" height="120" rx="26" fill="url(#logoG)"/>
  <text x="140" y="263" text-anchor="middle" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif"
        font-weight="700" font-size="76" fill="white">当</text>

  <!-- メインタイトル -->
  <text x="240" y="240" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif"
        font-weight="700" font-size="72" fill="white" letter-spacing="-2">当直表メーカー</text>

  <!-- サブテキスト -->
  <text x="240" y="296" font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif"
        font-weight="500" font-size="28" fill="#94a3b8">大学医局の当直・外勤表を、最速で作る</text>

  <!-- 機能バッジ -->
  <g font-family="-apple-system, 'Hiragino Kaku Gothic ProN', sans-serif" font-size="22" font-weight="600">
    <rect x="80" y="380" width="200" height="50" rx="25" fill="rgba(96,165,250,.15)" stroke="rgba(96,165,250,.4)"/>
    <text x="180" y="412" text-anchor="middle" fill="#bfdbfe">⚡ 自動振り分け</text>

    <rect x="300" y="380" width="200" height="50" rx="25" fill="rgba(96,165,250,.15)" stroke="rgba(96,165,250,.4)"/>
    <text x="400" y="412" text-anchor="middle" fill="#bfdbfe">📥 Excel出力</text>

    <rect x="520" y="380" width="200" height="50" rx="25" fill="rgba(96,165,250,.15)" stroke="rgba(96,165,250,.4)"/>
    <text x="620" y="412" text-anchor="middle" fill="#bfdbfe">🆓 無料で使える</text>
  </g>

  <!-- フッター -->
  <text x="80" y="560" font-family="-apple-system, sans-serif" font-weight="500" font-size="20" fill="#64748b" letter-spacing="2">tochoku-maker.vercel.app</text>
</svg>
